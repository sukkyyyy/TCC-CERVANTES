<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - Divine Cherie</title>
    <link rel="stylesheet" href="st_css.css">
    <link rel="icon" href="Logo.jpeg" type="image/x-icon">
</head>
<body>

    <header>
        <nav>
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='Ste_vendas.html'">
                <img src="Logo.jpeg" alt="Logo Divine Cherie" class="logo-img">
                <span>Divine Cherie</span>
            </div>
            <div class="menu-container">
                <ul>
                    <li><a href="Ste_vendas.html">Voltar para a Vitrine</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="pagina-produto-container">
            <div class="produto-col-esquerda">
                <img id="detalheImg" src="" alt="Imagem Grande do Perfume">
            </div>
            <div class="produto-col-direita">
                <h1 id="detalheNome" style="color: #c59f77; margin-bottom: 15px; text-align: left;">Nome do Produto</h1>
                <p id="detalheDescricao" class="descricao" style="text-align: left; font-size: 1.1rem; margin-bottom: 20px;">Descrição completa aqui.</p>
                <span id="detalhePreco" class="preco" style="text-align: left; font-size: 1.8rem; margin-bottom: 30px;">R$ 0,00</span>
                
                <div class="grupo-botoes-vendas">
                    <button class="btn-venda-fake btn-add-carrinho" onclick="alert('Esta função estará disponível em breve!');">Colocar no Carrinho</button>
                    <button class="btn-venda-fake btn-comprar-agora" onclick="alert('Para concluir a sua compra, você será redirecionado para o nosso WhatsApp suporte.'); window.open('https://wa.me/5511945747137', '_blank');">Comprar Agora</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-site">
        <div class="frase-motivacional">
            <p style="text-align: center; font-style: italic; margin-bottom: 20px;">Onde a elegância encontra o inesquecível.</p>
        </div>
        <div class="informacoes-empresa" style="text-align: center; margin-top: 30px; font-size: 0.85rem; color: #4b3f36; line-height: 1.6;">
            <p><strong>Divine Cherie</strong></p>
            <p>CNPJ: 23.435.334/0001-55</p>
            <p>Endereço: Rua Oscar Freire, 935 – Jardim Paulista, São Paulo - SP</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const parametros = new URLSearchParams(window.location.search);
            const nome = parametros.get('nome');
            const preco = parametros.get('preco');
            const img = parametros.get('img');
            const desc = parametros.get('desc');

            if (nome) document.getElementById('detalheNome').innerText = nome;
            if (preco) document.getElementById('detalhePreco').innerText = preco;
            if (desc) document.getElementById('detalheDescricao').innerText = desc;
            
            if (img) {
                const finalSrc = img.startsWith('imagens/') ? img : 'imagens/' + img;
                document.getElementById('detalheImg').setAttribute('src', finalSrc);
            }

            const logoImg = document.querySelector('.logo-img');
            if (logoImg && !logoImg.getAttribute('src').startsWith('imagens/')) {
                logoImg.setAttribute('src', 'imagens/' + logoImg.getAttribute('src'));
            }
        });
    </script>
</body>
</html>
