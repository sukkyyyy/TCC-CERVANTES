<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Carrinho - Divine Cherie</title>
    <link rel="icon" type="image/jpeg" href="Imagens/Logo.jpeg">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="Imagens/Logo.jpeg" alt="Divine Cherie" class="logo-img">
                <span>Divine Cherie</span>
            </div>
            <div class="menu-container">
                <ul>
                    <li><button onclick="window.location.href='index.html#feminino'">Feminino</button></li>
                    <li><button onclick="window.location.href='index.html#masculino'">Masculino</button></li>
                    <li><button class="btn-carrinho-texto" onclick="window.location.href='carrinho.html'">Seu Carrinho</button></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="cart-page-container">
        <div class="cart-card">
            <h1 class="cart-title">Seu Carrinho</h1>
            
            <div class="cart-content-layout">
                <div class="cart-main-content">
                    <div class="cart-item">
                        <div class="cart-item-image-wrapper">
                            <img src="Imagens/Azzurro Oceano.png" alt="Azzurro Oceano">
                        </div>
                        <div class="cart-item-details">
                            <h2 class="cart-item-name" id="carrinho-nome-item">AZZURRO OCEANO</h2>
                            <p class="cart-item-description">Uma fragrância marcante que combina o frescor das notas marinhas com a sofisticação do limão siciliano e a profundidade do cedro.</p>
                            <span class="cart-item-price">R$ 189,90</span>
                        </div>
                    </div>

                    <div class="shipping-section">
                        <h3>Calcular Frete e Prazo</h3>
                        <div class="shipping-input-group">
                            <input type="text" id="cart-cep-input" placeholder="Digite seu CEP (00000-000)" maxlength="9">
                            <button type="button" onclick="alert('Frete Grátis aplicado para a sua região!')">Calcular</button>
                        </div>
                    </div>
                </div>

                <div class="cart-summary-sidebar">
                    <h3>Resumo do Pedido</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>R$ 189,90</span>
                    </div>
                    <div class="summary-row">
                        <span>Frete</span>
                        <span class="free-shipping">Grátis</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Total</span>
                        <span id="carrinho-total-valor">R$ 189,90</span>
                    </div>
                    
                    <div class="cart-actions">
                        <button class="btn-checkout" onclick="enviarPedidoWhatsApp()">Finalizar Compra via WhatsApp</button>
                        <a href="index.html" class="btn-continue">Continuar Comprando</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <a href="https://wa.me" class="whatsapp-popup" target="_blank" rel="noopener noreferrer">
        <img src="https://flaticon.com" alt="WhatsApp">
    </a>

    <script>
        function enviarPedidoWhatsApp() {
            const seuNumeroTelefone = "5511945747137"; 

            const nomePerfume = document.getElementById('carrinho-nome-item').innerText;
            const valorTotal = document.getElementById('carrinho-total-valor').innerText;
            const cepDigitado = document.getElementById('cart-cep-input').value || "Não informado";

            const mensagem = `Olá, Divine Cherie! Gostaria de finalizar o meu pedido:\n\n` +
                             `🛍️ *Produto:* ${nomePerfume}\n` +
                             `💰 *Valor Total:* ${valorTotal}\n` +
                             `📍 *CEP para entrega:* ${cepDigitado}\n\n` +
                             `Como posso prosseguir com o pagamento?`;

            const linkWhatsApp = `https://wa.me{seuNumeroTelefone}?text=${encodeURIComponent(mensagem)}`;

            window.open(linkWhatsApp, '_blank');
        }
    </script>
</body>
</html>
